<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options Strategy Explainer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #9ca3af;
      --text: #e5e7eb;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --border: #1f2937;
      --code: #0b1020;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #1e293b, #0f172a 60%);
      color: var(--text);
    }
    header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.9);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      letter-spacing: 0.3px;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .container {
      padding: 24px;
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.5);
    }
    .card h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }
    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: linear-gradient(120deg, #0ea5e9, #38bdf8);
      color: #0b1220;
      font-weight: 600;
      border: none;
      margin-top: 8px;
    }
    button.secondary {
      background: #111827;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 6px;
      text-align: right;
    }
    th {
      color: var(--muted);
      font-weight: 500;
    }
    td:first-child, th:first-child {
      text-align: left;
    }
    .chat-log {
      background: #0b1220;
      border-radius: 12px;
      padding: 12px;
      min-height: 160px;
      white-space: pre-wrap;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 12px;
    }
    .code {
      background: var(--code);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.2);
      color: var(--accent);
      font-size: 11px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Options Strategy Explainer + Payoff Calculator</h1>
    <p>Educational only. Provide your own legs to evaluate with live premiums.</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="pill">Strategy Builder</div>
      <div class="row">
        <div>
          <label for="ticker">Ticker</label>
          <input id="ticker" placeholder="AAPL" />
        </div>
        <div>
          <label for="view">Market View</label>
          <select id="view">
            <option value="">Select view</option>
            <option value="bullish">Bullish</option>
            <option value="bearish">Bearish</option>
            <option value="neutral">Neutral</option>
            <option value="volatile">Volatile</option>
          </select>
        </div>
        <div>
          <label for="strategy">Strategy</label>
          <select id="strategy">
            <option value="">Select strategy</option>
            <option value="long call">Long Call</option>
            <option value="long put">Long Put</option>
            <option value="covered call">Covered Call</option>
            <option value="cash-secured put">Cash-Secured Put</option>
            <option value="bull call spread">Bull Call Spread</option>
            <option value="bear call spread">Bear Call Spread</option>
            <option value="bull put spread">Bull Put Spread</option>
            <option value="bear put spread">Bear Put Spread</option>
            <option value="long straddle">Long Straddle</option>
            <option value="long strangle">Long Strangle</option>
            <option value="short straddle">Short Straddle</option>
            <option value="short strangle">Short Strangle</option>
            <option value="iron condor">Iron Condor</option>
            <option value="iron butterfly">Iron Butterfly</option>
            <option value="collar">Collar</option>
            <option value="protective put">Protective Put</option>
            <option value="calendar spread">Calendar Spread</option>
            <option value="diagonal spread">Diagonal Spread</option>
            <option value="ratio spread">Ratio Spread</option>
            <option value="backspread">Backspread</option>
          </select>
        </div>
      </div>
      <button id="strategyBtn">Explain Strategy</button>
    </div>

    <div class="card">
      <div class="pill">Options Chain</div>
      <div class="row">
        <div>
          <label for="expiration">Expiration</label>
          <select id="expiration"></select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="secondary" id="loadExpirations">Load Expirations</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="secondary" id="loadChain">Load Chain</button>
        </div>
      </div>
      <div style="margin-top: 12px; max-height: 240px; overflow: auto;">
        <table id="chainTable">
          <thead>
            <tr>
              <th>Strike</th>
              <th>Call Bid</th>
              <th>Call Ask</th>
              <th>Call Mark</th>
              <th>Put Bid</th>
              <th>Put Ask</th>
              <th>Put Mark</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="pill">Leg Editor</div>
      <div id="legs"></div>
      <button class="secondary" id="addLeg">Add Leg</button>
      <button id="autofill">Autofill Premiums</button>
    </div>

    <div class="card">
      <div class="pill">Chat</div>
      <label for="message">Message</label>
      <textarea id="message" rows="4" placeholder="Ask about a strategy or evaluate your legs..."></textarea>
      <button id="send">Send</button>
      <div style="margin-top: 12px;">
        <div class="chat-log" id="chatLog"></div>
      </div>
    </div>

    <div class="card">
      <div class="pill">Computed Output</div>
      <div class="code" id="computedOutput">No calculation yet.</div>
    </div>
  </div>

  <script>
    const chainState = { rows: [] };

    const tickerEl = document.getElementById('ticker');
    const expirationEl = document.getElementById('expiration');
    const chainTableBody = document.querySelector('#chainTable tbody');
    const legsEl = document.getElementById('legs');
    const chatLog = document.getElementById('chatLog');
    const computedOutput = document.getElementById('computedOutput');

    function addLegRow(data = {}) {
      const row = document.createElement('div');
      row.className = 'row';
      row.style.marginBottom = '8px';
      row.innerHTML = `
        <div>
          <label>Instrument</label>
          <select class="instrument">
            <option value="option">Option</option>
            <option value="stock">Stock</option>
          </select>
        </div>
        <div>
          <label>Type</label>
          <select class="option_type">
            <option value="call">Call</option>
            <option value="put">Put</option>
          </select>
        </div>
        <div>
          <label>Side</label>
          <select class="side">
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
          </select>
        </div>
        <div>
          <label>Strike</label>
          <input class="strike" placeholder="100" />
        </div>
        <div>
          <label>Expiration</label>
          <input class="expiration" placeholder="YYYY-MM-DD" />
        </div>
        <div>
          <label>Premium</label>
          <input class="premium" placeholder="Optional" />
        </div>
        <div>
          <label>Qty</label>
          <input class="quantity" value="1" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="secondary remove">Remove</button>
        </div>
      `;
      legsEl.appendChild(row);
      row.querySelector('.remove').addEventListener('click', () => row.remove());
      if (data) {
        row.querySelector('.instrument').value = data.instrument || 'option';
        row.querySelector('.option_type').value = data.option_type || 'call';
        row.querySelector('.side').value = data.side || 'buy';
        row.querySelector('.strike').value = data.strike || '';
        row.querySelector('.expiration').value = data.expiration || '';
        row.querySelector('.premium').value = data.premium || '';
        row.querySelector('.quantity').value = data.quantity || 1;
      }
    }

    function collectLegs() {
      const rows = Array.from(legsEl.children);
      return rows.map(row => {
        const instrument = row.querySelector('.instrument').value;
        const leg = {
          instrument,
          side: row.querySelector('.side').value,
          quantity: parseInt(row.querySelector('.quantity').value || '1', 10),
        };
        if (instrument === 'option') {
          leg.option_type = row.querySelector('.option_type').value;
          leg.strike = parseFloat(row.querySelector('.strike').value || '0');
          leg.expiration = row.querySelector('.expiration').value;
        }
        const prem = row.querySelector('.premium').value;
        if (prem !== '') {
          leg.premium = parseFloat(prem);
        }
        return leg;
      });
    }

    async function loadExpirations() {
      const ticker = tickerEl.value.trim();
      if (!ticker) return;
      const res = await fetch(`/api/chain?ticker=${ticker}`);
      const data = await res.json();
      expirationEl.innerHTML = '';
      (data.expirations || []).forEach(exp => {
        const opt = document.createElement('option');
        opt.value = exp;
        opt.textContent = exp;
        expirationEl.appendChild(opt);
      });
    }

    async function loadChain() {
      const ticker = tickerEl.value.trim();
      const expiration = expirationEl.value;
      if (!ticker || !expiration) return;
      const res = await fetch(`/api/chain?ticker=${ticker}&expiration=${expiration}`);
      const data = await res.json();
      chainState.rows = data.chain || [];
      chainTableBody.innerHTML = '';
      chainState.rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.strike}</td>
          <td>${row.call?.bid ?? ''}</td>
          <td>${row.call?.ask ?? ''}</td>
          <td>${row.call?.mark ?? ''}</td>
          <td>${row.put?.bid ?? ''}</td>
          <td>${row.put?.ask ?? ''}</td>
          <td>${row.put?.mark ?? ''}</td>
        `;
        chainTableBody.appendChild(tr);
      });
    }

    function autofillPremiums() {
      const rows = Array.from(legsEl.children);
      rows.forEach(row => {
        const instrument = row.querySelector('.instrument').value;
        if (instrument !== 'option') return;
        const premiumInput = row.querySelector('.premium');
        if (premiumInput.value) return;
        const strike = parseFloat(row.querySelector('.strike').value || '0');
        const optionType = row.querySelector('.option_type').value;
        const match = chainState.rows.find(r => Math.abs(r.strike - strike) < 1e-6);
        if (match && match[optionType]) {
          const mark = match[optionType].mark ?? ((match[optionType].bid + match[optionType].ask) / 2);
          if (mark) premiumInput.value = mark;
        }
      });
    }

    function appendChat(role, text) {
      chatLog.textContent += `\n${role}: ${text}\n`;
    }

    async function sendChat(withStrategy = false) {
      const payload = {
        message: document.getElementById('message').value,
        ticker: tickerEl.value.trim() || null,
        view: document.getElementById('view').value || null,
        strategy: document.getElementById('strategy').value || null,
        legs: collectLegs(),
      };
      appendChat('User', payload.message || '[strategy builder]');
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      appendChat('Assistant', data.response_text || '');
      if (data.computed) {
        computedOutput.textContent = JSON.stringify(data.computed, null, 2);
      }
    }

    document.getElementById('addLeg').addEventListener('click', () => addLegRow());
    document.getElementById('autofill').addEventListener('click', autofillPremiums);
    document.getElementById('loadExpirations').addEventListener('click', loadExpirations);
    document.getElementById('loadChain').addEventListener('click', loadChain);
    document.getElementById('send').addEventListener('click', () => sendChat());
    document.getElementById('strategyBtn').addEventListener('click', () => sendChat(true));

    addLegRow();
  </script>
</body>
</html>
